<!DOCTYPE html>
<html>
<head>
    <title>Beelzebub Dashboard</title>
    <style>
        body { font-family: Arial; }
        table { border-collapse: collapse; width: 100%; }
        td, th { border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body>
    <h1>Beelzebub Live Logs</h1>
    <table id="logTable">
        <thead>
            <tr>
                <th>Timestamp</th><th>Level</th><th>Message</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script>
        // periodically fetch logs
        function fetchLogs() {
            fetch("/logs")
                .then(resp => resp.json())
                .then(logs => {
                    let tbody = document.querySelector("#logTable tbody");
                    tbody.innerHTML = '';
                    logs.slice(-50).reverse().forEach(x => { // show last 50
                        let tr = document.createElement("tr");
                        tr.innerHTML = `
                            <td>${x["@timestamp"]||""}</td>
                            <td>${x["log.level"]||""}</td>
                            <td>${x["message"]||""}</td>
                        `;
                        tbody.append(tr);
                    });
                });
        }
        setInterval(fetchLogs, 2000); // every 2 seconds
        fetchLogs();
    </script>
</body>
</html>
